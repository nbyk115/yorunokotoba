勇気を持って。かに座の甘え方、実は相手も嬉しいから。","相手の機嫌が自分の機嫌に直撃するタイプ。今日は「これ相手の感情？私の感情？」を分けて考えてみて。","昔のことをふと思い出す日。懐かしむのはいい。でも「今」にある幸せも同じくらい大事にして。","守りたい人がいるのは分かる。でも今日はまず自分を守ることが最優先。自分が壊れたら誰も守れない。","居心地のいい空間を作る天才。今日もその「場」が誰かの救いになってるよ。そのままでいて。",],しし座:["「見てほしい」と「見てほしいと思ってる自分が嫌」の間で揺れてない？その葛藤、しし座あるあるだよ。","プライドが邪魔して「ごめん」が出てこない場面ある。今日その一言を言えたら、あなたの格が上がる日。","あなたがいるだけで場の空気が変わる日。意識しなくていい、存在してるだけで十分オーラ出てる。","褒められたら「ありがとう」だけ言って。「そんなことない」の謙遜、今日はやめてみて。受け取る練習。","リーダーシップを発揮したい日。でも「命令」より「巻き込む」のほうが今日は効く。一緒に、が合言葉。","自分へのご褒美、最近したっけ？今日は理由なくて大丈夫。頑張ってるから、それだけで十分な理由になる。","嫉妬してる自分に気づいた？それは「本当はこうなりたい」という地図。嫉妬の正体を見れたら、次の目標が見える。",],おとめ座:["「完璧じゃないと出せない」が続いてない？今日は60点で出してみて。完璧なまま眠らせるより100倍いい。","人の欠点が目につく日。でもそれはあなたの観察眼が高い証拠。同じ目を自分の良いところにも向けてみて。","「ちゃんとしなきゃ」で自分を追い詰めてない？今日だけは「ちゃんとしない自分」も許してあげて。","細かいところまで気を配れるのがおとめ座の強み。今日もその丁寧さが、誰かの「助かった」を生んでる。","頭で考えすぎて体の声を無視してない？今日は「なんか疲れた」を我慢しないで。体が先に正解を知ってる。","分析力が冴えてる日。直感より論理で動くと、今日は特に正解に辿り着く確率が高い。","誰かに「大丈夫？」って聞かれたら正直に答えて。強がらなくていい日。弱さを見せると距離が縮まる。",],てんびん座:["「どっちでもいいよ」が続いてない？今日は自分の意見を通す練習。一個だけ「私はこっちがいい」って言って。","全員に好かれようとするのやめてみて。大事な人数人に深く好かれるほうが、あなたの心が満たされる。","バランスを取ることに疲れてる日。今日は片方に振り切っていい。全部取ろうとすると全部失う。","美意識が冴えてる日。服でも言葉でも、今日の「なんかいい」という感覚は信頼して大丈夫。","人間関係の整理を考えてる？今日はその直感に正直になって。心地いい関係だけに絞っていく勇気を。","迷ったとき「どっちが美しい選択か」で決めてみて。てんびん座の美意識は今日、特に正確に動いてる。","聞き上手なのはあなたの才能。でも今日は自分の話もして。聞いてほしい人が実はそこにいる。",],さそり座:["全部見抜いてるのに言わない。それがさそり座の処世術。でも今日は信頼できる一人にだけ、少し見せてもいい。","執着を手放すと決めた瞬間、急に楽になるあれ——今日がそのタイミングかもしれない。「もういいや」は弱さじゃない。","洞察力が最大の武器になる日。人の本音が手に取るように分かる。全部に反応しなくていいけど、大事な情報は掴んで。","「白か黒か」で決めようとしてない？今日だけはグレーも正解として受け入れてみて。曖昧さの中に答えがある日。","嫉妬心が出てきたら、それはあなたが本気の証拠。「本当はこうなりたい」エネルギーに変換して。","深く傷つける分だけ、深く愛せる。その感受性の強さは、さそり座にしかない特別な力。今日はそれを誰かに向けて。","心の鎧をたまには外してみて。意外と世界は優しいし、弱さを見せたほうが人は寄ってくる。",],いて座:["退屈が一番の敵のあなたへ。今日は「非日常」を自分で作って。待ってたら来ない、作りに行くのがいて座。","自由を求めすぎて孤独になってない？今日はちょっと誰かに合わせてみて。それも冒険のうちだから。","「もっと面白いことないかな」と思ったら、自分が面白くなれ。今日のあなたには十分なエネルギーがある。","楽観的なのはいい。でも今日だけはお金と健康は現実的に見て。未来の自分への最低限の保険として。","遠くの夢を描きながら、足元が見えてないことがある。今日は目の前の1つに集中する日。","ポジティブなエネルギーが溢れてる日。その明るさを誰かにおすそ分けして。あなたがいるだけで場が明るくなる。","「計画なし」で動くのがいて座の魅力だけど、今日は3割だけ計画を持って動いてみて。結果が全然違う。",],やぎ座:["また頑張りすぎてない？今日は「やらない」を選ぶ勇気の日。サボることも長期的には投資になる。","コツコツ積んできたもの、そろそろ形になってくる。「まだ足りない」は嘘。周りはもうとっくに気づいてる。","責任感が強すぎて全部一人で抱えてない？今日は「任せる」練習。頼られた側も嬉しいから。","仕事モードから抜け出せない日。意識的にオフのスイッチを入れないと、一生オンのまま終わる。今日は意図的に休んで。","「弱みを見せたら負け」じゃない。人に素直になれた日、あなたへの好感度は実は上がってる。","長期的な視点で物事を見られるのがやぎ座の強み。今日の選択は、1年後のあなたを助ける投資になってる。","「真面目でいい子」を今日だけ休んでみて。ちょっとわがままな自分も、愛されていいよ。",],みずがめ座:["「変わってるね」は最高の褒め言葉。でも今日は一人の意見だけ聞いてみて。意外な視点が刺さるかもしれない。","未来のことを考えすぎてない？今この瞬間にある「好き」を大事にして。今日は現在時制で生きる日。","孤独を「選んでいる」のか「孤立している」のか、今日だけ正直に確かめてみて。どっちかで対処が変わる。","常識を疑える力が今日は特に強い。でもそれを「伝える言い方」だけ気をつけて。中身は正しいから。","デジタルから少し離れてみて。SNSを閉じた後に残る気持ちが、今の本音を教えてくれる。","「理屈じゃなく感情で動く」を今日一度やってみて。分析より「好き」だけで選ぶと、意外と正解だったりする。","独自路線でいい。でも今日は「誰かと一緒に」も試してみて。あなたにしか作れないコラボが生まれる日。",],うお座:["感受性が高すぎて疲れてない？今日拾った感情が「相手のもの」か「自分のもの」かを分けるだけで楽になる。","直感が冴えまくってる日。「なんとなくこっち」を信じて動いて。説明できなくていい、後からついてくる。","優しすぎて断れなかった経験、今週もあった？今日は一個だけ「無理です」を練習してみて。","泣きたくなったら泣いていい。感情を流すことが、うお座にとっての一番の浄化。我慢は体に毒。","夢で見たことにヒントがあるかもしれない。今日ふと思い浮かんだイメージ、メモしておいて。","クリエイティブなエネルギーが溢れてる日。文章でも、絵でも、料理でも——何か形にしてみて。","現実と夢の間をふわふわしてるのがうお座。でも今日は10分だけ「現実的なこと」に向き合って。それだけでOK。",],};const insightRng=makeSeededRandom(getDailySeed(signIdx*7+333));const insightList=SIGN_DAILY_INSIGHTS[sign]||SIGN_DAILY_INSIGHTS["おひつじ座"];const dailyInsight=insightList[Math.floor(insightRng()*insightList.length)];const spWithDaily={...sp,dailyInsight};const rankMsgsList={"大吉": [{summary: name+"さん、今日の星回り、年に数回レベル。「なんとなくうまくいく気がする」その感覚、今日は信じていい。直感に従って動いた分だけ、いい結果が来る日。", time: "夕方以降に大事なLINEが来る気配。今日は既読スルーしないで。", risk: "テンションが上がりすぎて余計な一言が出やすい日。特に深夜の投稿・メッセージは翌朝確認してから送って。"},{summary: name+"さん、今日は何をやっても「当たり」の日。選択肢で迷ったら「楽しそう」な方を選んで。論理より感覚を信じる日。", time: "出かける前の準備に時間をかけると吉。身だしなみが今日の運気を左右する。", risk: "調子が良すぎると油断が出る。財布とスマホは特に気をつけて。"},{summary: name+"さん、今日のあなた、ちょっとオーラが違う。周りの反応がいつもと変わるはず。その波に気づいたら、怖がらず乗って。", time: "起きてすぐの直感が一番正確。ふと浮かんだことをメモしておくと後で役に立つ。", risk: "期待されやすい日だから、引き受けすぎには気をつけて。「できます」は今日だけは慎重に。"},{summary: name+"さん、今日は「本音を言っても許される日」。いつも気を使いすぎてるなら、今日だけは自分の意見を出して。場の空気が不思議と受け入れてくれる。", time: "夜の時間帯が勝負。重要な話は夕方以降にするのがベスト。", risk: "いい日だからこそ、他人への配慮も忘れずに。「今日は運がいい」の油断が一番の敵。"},{summary: name+"さん、存在感が最大値の日。いるだけで場の雰囲気が変わる。自分では気づいてないかもしれないけど、周りはちゃんと見てる。", time: "動き出しの最初の1時間が黄金タイム。グズグズしないで、起きたら即行動。", risk: "目立つ日は嫉妬も生まれやすい。自慢話はほどほどに、でも堂々としてていい。"},{summary: name+"さん、後から「あの時動いてよかった」と思える日。気になってたこと、ずっと後回しにしてたこと、今日がそのタイミング。", time: "大事な人からの連絡、今日は即レスで。返信の速さが流れを変える。", risk: "ノリで約束しすぎないように。テンションで「いいよ！」と言った後で「え？」ってなる日。"},{summary: name+"さん、星が全力でプッシュしてる日。「私なんて」は今日だけ封印。自信がなくても行動した人が勝つ、それが今日のルール。", time: "誘いが来たら今日は乗って。断った先には何もないけど、受けた先には何かある。", risk: "全力で楽しんだ後の回復も計算に入れて。明日の自分に優しくしておくのが最高の1日の締め方。"},],"中吉": [{summary: name+"さん、今日は声がかかりやすい日。「ちょっといい？」から始まる話、全部乗ってみて。人とのやりとりの中に今日のラッキーが潜んでる。", time: "目上の人からの評価が動くタイミング。いつも通りの丁寧さが今日は特に伝わる。", risk: "胃腸が弱めの日。食べすぎ注意。胃が重いと判断も鈍る。"},{summary: name+"さん、今日は「与えると倍で返ってくる日」。おごる、譲る、褒める。計算じゃなく自然体でやると、ちゃんと巡り巡って返ってくる。", time: "会話の中にチャンスが隠れてる。相手の話を聞くことに今日は集中して。", risk: "気前よくなりすぎて自分が損してない？出す前に自分の余裕を確認して。"},{summary: name+"さん、感覚が鋭い日。「なんかこの人いいな」「なんか違和感ある」——その直感は今日特に当たってる。論理より体感を信じて。", time: "出かける前に少しだけ一人の時間を作って。整ってから動くと流れが変わる。", risk: "考えすぎると逆に判断が鈍る日。頭で10回悩むより、心で1回決めたほうが正解。"},{summary: name+"さん、小さなラッキーが重なる日。信号が全部青とか、タイミングがぴったり合うとか。「今日なんかいい」と思ったら、その流れに乗って。", time: "起きてからの数時間が集中力のピーク。この時間にやりたいことを片付けておくと後が楽になる。", risk: "いい波に乗ってる時こそ慢心しないで。謙虚さが次の運気を引き寄せる。"},{summary: name+"さん、「つながり」が強まる日。久しぶりに連絡したいと思ってた人、今日が正解のタイミング。向こうもあなたのこと考えてるかも。", time: "帰り道にラッキーが潜んでる。いつもと少し違うルートを選んでみて。", risk: "「あとで返す」を今日だけはやめて。既読スルーが今日の信頼に直結する日。"},{summary: name+"さん、今日のあなたの話が面白い。いつもより言葉に引きつける力がある。会話を楽しんで、アイデアを声に出してみて。", time: "夜があなたの本領発揮タイム。一番大事なことはここで。", risk: "盛り上がりすぎると口が滑る日。「これ秘密なんだけど」は今日だけ我慢。"},{summary: name+"さん、今日は誰かの一言があなたの答えになる日。アンテナ高くして、人の話を聞いてみて。思わぬところにヒントが落ちてる。", time: "お風呂やシャワーの時間にアイデアが降ってくる。スマホを持ち込まず、頭を空っぽにして。", risk: "人の意見に流されすぎないように。参考にするのはいい、でも最後は自分で決めて。"},],"小吉": [{summary: name+"さん、派手さはないけど「なんかいい日だったな」と夜に思える日。小さな親切が積み重なって、じわじわ運気が上がってる。", time: "朝のうちに身の回りを片付けておくと、夜の流れがよくなる。やることは午前中に終わらせて。", risk: "SNSを見すぎると「自分だけ取り残されてる」モードに入りやすい日。通知を切って目の前のことに集中。"},{summary: name+"さん、今日は「丁寧に過ごす」が一番の開運。コーヒーをちゃんと味わう、靴を揃える。そういう小さな積み重ねが今日の流れを作る。", time: "焦って決めるのは今日だけ避けて。「ちょっと待って」が使えるなら使う。", risk: "急ぎで決断すると裏目に出やすい日。「急かされてる感」があるときほど一呼吸入れて。"},{summary: name+"さん、今日はインプットの日。気になってた動画、記事、本——今日触れたものが来週以降のあなたを助ける。投資の日だと思って。", time: "夕方の集中力が高まってくる。気になってたことを調べたり、自分磨きに使うといい時間帯。", risk: "情報を入れすぎると頭がパンクする日。「もう十分」と思ったら散歩で切り替えて。"},{summary: name+"さん、地味にツイてる日。「あ、これ見つかった」「タイミングぴったり」って瞬間が来る。小さなラッキーを見逃さないで。", time: "午前中から動くとサクサク進む。夕方は流れに任せてOK。", risk: "「まあいっか」が多くなりやすい日。大事なことだけは先送りにしないで。"},{summary: name+"さん、今日は周りの優しさに気づける日。「ありがとう」を意識的に多く言ってみて。言葉は循環するから、巡り巡って自分に返ってくる。", time: "終わり際に小さなラッキーが。最後まで手を抜かないで。", risk: "自分を後回しにしがちな日。まず自分のご機嫌を取ってから、人のことを考えて。"},{summary: name+"さん、「あえてゆっくり」が今日は正解。焦って動くと空回りする。深呼吸して、自分のリズムで進めて。周りに合わせる必要はない。", time: "後半にいい流れが来る。前半は無理しないで省エネモードで。", risk: "周りのテンションに引っ張られて疲れやすい日。自分のペースは絶対に守って。"},{summary: name+"さん、身の回りを整えると運気が動く日。部屋の片付け、バッグの中の整理、財布の中身の確認。スッキリした空間がチャンスを呼ぶ。", time: "部屋を整えてから動くと、夜の流れが全然違う。まず10分だけ片付けから。", risk: "完璧にやろうとしすぎると結局何もできない日。「60点でいい」の精神で始めてみて。"},],"吉": [{summary: name+"さん、今日まいた種が2〜3週間後に実を結ぶ日。気になってた人に連絡する、行ってみたかった場所に行く——小さな行動が未来を変える。", time: "夜遅くにいい流れが来る。終わり際まで気を抜かないで。", risk: "「なんか違う」と感じた直感、今日は特に正確。無理に合わせなくていい場面がある。"},{summary: name+"さん、「続ける」が開運キーワードの日。地味に続けてきたことが、そろそろ形になり始めるサイン。やめないで、もう少しだけ。", time: "いつものルーティンがいつもより効く日。手順を丁寧にやるだけで結果が変わる。", risk: "今日は新しいことより、今あるものを磨くほうが吉。手を広げすぎると全部中途半端になる。"},{summary: name+"さん、小さな勇気が試される日。普段やらないことを一つだけやってみて。「できなかったらどうしよう」より「やったらどうなる？」で考えて。", time: "夜に決断の場面が来る。迷ったら「やる」を選んで。後悔するなら動いた後の後悔を選んで。", risk: "変化を恐れすぎると機会を逃す日。でも無茶はしなくていい。一歩だけでOK。"},{summary: name+"さん、今日は裏方が似合う日。目立つより支える側に回ると、後からちゃんと評価が来る。今日の頑張りは見えないけど、積み上がってる。", time: "前半は静かに準備して、夜から動くのがベスト。", risk: "手柄を横取りされそうでも今日は泳がせて。見てる人はちゃんと見てるから。"},{summary: name+"さん、整理の日。いらない人間関係、古いデータ、部屋のもの——手放すと新しいものが入ってくるスペースができる。今日はデトックスday。", time: "夕方から頭がクリアになってくる。エンジンがかかってからが本番。", risk: "勢いで大事なものまで捨てないように。「迷ったら取っておく」が今日のルール。"},{summary: name+"さん、目に見えない資産が育ってる日。健康、信頼、スキル——今日の地味な行動が半年後に大きく効いてくる。派手さはないけど確実に積み上がってる。", time: "早めに動くほど吉。夕方までの行動のリターンが一番大きい。", risk: "華やかさを求めると空振りする日。地道が最強。"},{summary: name+"さん、「待つ力」が試される日。焦って動くより、相手のタイミングを待つほうがうまくいく。我慢は今日だけの投資だと思って。", time: "帰宅後に嬉しい知らせが届く予感。こまめにスマホをチェックして。", risk: "催促したくなっても今日はグッと堪えて。急かすと逆効果になる日。"},],"末吉": [{summary: name+"さん、今日は「静」の日。お風呂にゆっくり浸かって、好きなものを食べて、早めに寝る。それが今日の最強行動。無理して動くと来週にツケが来る。", time: "起きてからしばらくは省エネモードで。夕方にエネルギーが戻ってくるから焦らないで。", risk: "今日の疲れは本物。「気のせい」じゃなくて体と心が休息を求めてる。聞いてあげて。"},{summary: name+"さん、頑張らなくていい日。「生きてるだけで偉い」が今日のあなたには一番正確な言葉。自分を責めてるなら、それは運気のせい。あなたは悪くない。", time: "夕方まではゆっくりペースで。夜には少し気力が戻ってくる。", risk: "完璧を目指さないで。今日の60点は他の日の120点に値する。"},{summary: name+"さん、空白の時間を作ってみて。予定を入れない、ぼーっとする贅沢。何もしない時間から生まれるものが今日はある。", time: "帰宅後の時間が一番頭がクリア。その時間に浮かんだことをメモして。", risk: "無理にテンションを上げようとすると、余計に疲れる日。ローテンションの自分を許してあげて。"},{summary: name+"さん、嵐の前の静けさ日。明日以降に運気が上がってくるから、今日はしっかり充電しておいて。休んだ分だけ、次に全力で動ける。", time: "朝のうちに済ませられることは済ませておくと楽になる。用事はまとめて早めに。", risk: "大事な決断は今日じゃなくていい。先送りが正解な珍しい日。"},{summary: name+"さん、内省の日。最近モヤモヤしてることを、紙に書き出してみて。書くだけで半分は解決する。頭の中のノイズを外に出して整理する日。", time: "起きてすぐが一番頭がクリア。大事な考え事はこのタイミングで。", risk: "人に相談するのは明日以降がいい。今日は自分の中で温める日。"},{summary: name+"さん、守りの日。攻めなくていい。現状維持が今日の最適解。今あるものを大切にすることが、明日の自分への贈り物。", time: "夕方の静かな時間が一番穏やか。その時間を大事にして。", risk: "新しいことを始めるには向かない日。計画を立てるだけならOK。実行は来週からにして。"},{summary: name+"さん、五感を大事にして。美味しいもの、いい香り、肌触りのいい服——体を喜ばせることが今日の開運。頭じゃなくて体が先に答えを知ってる日。", time: "夕方は感覚が敏感になる。スキンケアやヘアケアの効果が出やすい時間帯。", risk: "頭で考えすぎると沼にはまる日。今日は体の声を信じて動いて。"},],};const dailyRng0=makeSeededRandom(getDailySeed(signIdx*13+777));const rmList=rankMsgsList[rank];const rm=rmList[Math.floor(dailyRng0()*rmList.length)];const SIGN_GENDER_CHAR={"おひつじ座":{female:"hi_no_tora",male:"sora_unicorn"},"おうし座":{female:"hana_panda",male:"niji_koala"},"ふたご座":{female:"mori_risu",male:"yuki_hakucho"},"かに座":{female:"umi_rakko",male:"yume_kobuta"},"しし座":{female:"tsuki_hyou",male:"hi_no_tora"},"おとめ座":{female:"yuki_hakucho",male:"mori_risu"},"てんびん座":{female:"sora_unicorn",male:"hana_panda"},"さそり座":{female:"tsuki_hyou",male:"umi_rakko"},"いて座":{female:"sora_unicorn",male:"hi_no_tora"},"やぎ座":{female:"niji_koala",male:"tsuki_hyou"},"みずがめ座":{female:"yuki_hakucho",male:"sora_unicorn"},"うお座":{female:"yume_kobuta",male:"umi_rakko"}};const genderKey=gender==="male"?"male":"female";const charId=(SIGN_GENDER_CHAR[sign]&&SIGN_GENDER_CHAR[sign][genderKey])||"yume_kobuta";const bestType=DREAM_TYPES.find(t=>t.id===charId)||DREAM_TYPES[0];const dailyRng=makeSeededRandom(getDailySeed(signIdx*31+500));const dailyLove=DAILY_LOVE[Math.floor(dailyRng()*DAILY_LOVE.length)];const dailyWork=DAILY_WORK[Math.floor(dailyRng()*DAILY_WORK.length)];const dailyHealth=DAILY_HEALTH[Math.floor(dailyRng()*DAILY_HEALTH.length)];return{rank,summary:rm.summary,time:rm.time,risk:rm.risk,personality:spWithDaily,lucky:generateLucky(signIdx),sign,type:bestType,dailyLove,dailyWork,dailyHealth};}function analyzeDream(text,signIdx){const rng0=makeSeededRandom(getDailySeed(simpleHash(text)*7));const rng1=makeSeededRandom(getDailySeed(simpleHash(text)*3+1));const map={蛇:[{m:"変容・再生",d:"今の自分を一度壊して作り直したい欲求が夢に出た。脱皮するように、変わることへの恐れを手放すタイミング。",hint:"今日は「古いルール」を1つだけ捨てて。自分で自分に課してた制限、本当に必要？",should:["今まで我慢してたこと1つを、小さくでいいから解放する","「もう古い」と感じてることをリストアップして見直す"]},{m:"直感・本能",d:"誰かに惹かれてる、またはあなた自身が誰かを引き寄せてる。本能レベルのシグナルを見逃さないで。",hint:"今日感じた「なんか気になる」を論理で消さないで。体の直感は頭より正直。",should:["気になってる人に、理由なく連絡してみる","自分の「好き嫌い」を今日は素直に優先する"]},{m:"恐れの直視",d:"怖いと思ってることの正体が分かりかけてる。蛇は恐ろしくても毒にも薬にもなる。あなたの怖さの中にヒントがある。",hint:"今日一番怖いと感じてることを紙に書いてみて。形にした瞬間、半分は消えるから。",should:["「最悪のケース」を具体的に書き出して現実的に見る","怖くて後回しにしてた連絡や行動を1つだけする"]}],歯:[{m:"自信・見た目への不安",d:"外側からの評価が気になりすぎてる。見た目や印象を気にして疲れてない？内側を磨く時期。",hint:"今日は「他人にどう見えるか」より「自分がどう感じるか」だけを基準にして。",should:["鏡を見て1つだけ自分を褒める","SNSをあえて見ない時間を2時間作る"]},{m:"コントロール喪失",d:"自分でコントロールできない何かへの不安が夢に出た。全部を握ろうとしてない？手放せるものがある。",hint:"今日「これは自分でコントロールできない」と認めることを1つ決めて。手放すと楽になる。",should:["心配リストを書いて「自分でできること」と「できないこと」に分ける","できないことへの対策より、できることに集中する"]},{m:"言えない言葉",d:"言いたいのに言えないことが溜まってる。歯が抜ける夢は「言葉が出ない」状態の投影。声にできない何かがある。",hint:"今日誰かに「実は…」って始まる話を1つだけしてみて。言わなくていいと思ってたことほど言葉にすると楽になる。",should:["ずっと伝えられてなかったことを文章でもいいから書き出す","近い人に素直な気持ちを伝える機会を作る"]}],水:[{m:"感情の抑圧",d:"抑えてきた気持ちが水の形で溢れてきてる。感情を処理しきれてないサイン。誰かに話すタイミングかも。",hint:"今日は感情を「処理しようとしない」で。ただ感じるだけでいい。泣きたければ泣く。",should:["感情をそのまま日記に書き出す（解決策を書かなくていい）","信頼できる人に「ちょっと聞いてほしいことがある」と声をかける"]},{m:"浄化・流れ",d:"古いものを流して新しい流れに乗ろうとしてる。水は常に低いところへ。あなたも自然な方向に動いていい。",hint:"今日は「抗わない」を意識して。うまくいかないことは流れに逆らってるサインかも。",should:["「なんとなく違うな」と感じてることを1つやめる","今日来た機会や誘いに、いつもより素直に乗ってみる"]},{m:"癒し・回復欲求",d:"心が休息を求めてる。頑張り続けた後に水の夢を見るのは「そろそろ回復して」というサイン。",hint:"今日は生産性を捨てていい日。何もしない時間を意図的に作って。それが一番の投資。",should:["予定を1つキャンセルして休む時間を作る","お風呂をいつもより長く、湯船に浸かる"]}],飛:[{m:"自由への渇望",d:"今いる場所への窮屈さと、どこかへ行きたい衝動。その気持ちは正しい。まず「何から自由になりたいか」を言語化して。",hint:"今日は「いつもこうしてる」ルーティンを1つだけ破って。小さな自由が大きな翼を作る。",should:["「本当はやりたいけどやってないこと」を3つ書き出す","普段行かない場所に今日ふらっと行ってみる"]},{m:"現状突破の準備",d:"内側でエネルギーが高まってる状態。飛ぶ前の助走。今は「準備ができた」サインかも。",hint:"今日一番「怖いけどやりたい」と思ってることに向けて、一番小さい一歩だけ踏み出して。",should:["ずっと先延ばしにしてた行動を今日10分だけやる","「やる気が出たらやろう」をやめ、やってからやる気を出す"]},{m:"上昇・成長欲求",d:"もっと上へ、もっと先へ。今のあなたには上昇気流が来てる。乗り遅れないで。",hint:"今日は「できる」前提で計画を立てて。「どうせ無理」フィルターを一時的に外してみて。",should:["今すぐできる「ちょっと背伸びした目標」を1つ設定する","尊敬できる人に今日連絡してみる"]}],追:[{m:"未解決の課題",d:"向き合えていない何かが追いかけてくる形で出た。逃げ続けると夢も続く。一度だけ立ち止まって振り返る価値がある。",hint:"今日「後でやろう」と思ってることの中で、5分で終わるものを1つだけ今すぐやって。",should:["先延ばしリストを作って一番小さいものから1つ片付ける","「向き合うのが怖い」と感じてることの正体を紙に書く"]},{m:"プレッシャー・期待",d:"誰かの期待に応えようとして追われてる感覚。その期待、本当に相手が求めてる？思い込みじゃないか確認して。",hint:"今日は「やらなきゃ」リストを全部書いてから、本当に今日必要なものだけに絞って。残りは消す勇気を持って。",should:["「やらなきゃ」と「やりたい」を分けてリストを書く","1つだけ断る練習をする"]},{m:"焦り・時間切れへの恐怖",d:"間に合わない感覚、乗り遅れる恐怖。でも人生に「乗り遅れる」はない。あなたのペースが正しいペース。",hint:"今日SNSで誰かと比べそうになったら、アプリを閉じて。あなたの「今」は誰とも比較できない。",should:["今日比べてしまった相手のことは一旦忘れ、自分の現在地を確認する","「いつまでに何をする」の小さな締め切りを自分で設定する"]}],落:[{m:"基盤・安定への不安",d:"地に足がつかない感覚。基盤となるもの（関係、仕事、自分軸）が揺らいでるサイン。今一度、自分の軸を確認して。",hint:"今日「これだけは絶対に守る」ことを1つ決めて。小さな軸が大きな安定を作る。",should:["自分が一番大切にしてる価値観を3つ書き出す","「なんとなく不安定」な関係や環境を1つ見直す"]},{m:"コントロールの手放し",d:"何かを手放さなければならない局面。でも落ちる夢を見た日の翌日は、意外と着地が柔らかい。",hint:"今日「まだ握ってる」ものを1つだけ手放す練習を。執着してるものほど、離した方が楽になる。",should:["「もう終わってるのに引きずってること」を1つ書く","その1つに対して小さなけじめをつける行動をする"]},{m:"変化への恐怖",d:"変化のタイミングに差し掛かってる。落ちる夢は「変化が怖い」気持ちの投影。でも落ちた先に新しい景色がある。",hint:"今日は「変わることへの恐れ」を認めていい。恐れは行動を止めるが、認めると動けるようになる。",should:["変えたいけど怖くて変えられてないことを1つ書く","その変化の「最初の1歩」だけを今日実行する"]}],火:[{m:"情熱・怒り",d:"抑えてた感情エネルギーが爆発しそうな状態。それは怒りかもしれないし情熱かもしれない。どちらも大切なエネルギー。",hint:"今日モヤッとしたら、その感情を「何が嫌だったか」まで言語化して。漠然とした感情は言葉にすると扱いやすくなる。",should:["今日感じたネガティブな感情を否定せず「私は今○○と感じてる」と言語化する","その感情の原因になった出来事を客観的に見直す"]},{m:"情熱・創造",d:"何かを強く求めてる、作りたい、成し遂げたい衝動がある。その熱を冷やさないで。",hint:"今日「熱くなれること」に1時間だけ全力を注いで。情熱は使うほど大きくなる。",should:["「好き」「楽しい」と感じることを今日1つやる","アイデアや夢を誰かに話してみる"]},{m:"浄化・変革",d:"古いものを燃やして新しくなる準備ができてる。火は破壊するが同時に再生の始まり。",hint:"今日「もう終わり」にしていいものを1つ決めて。終わらせる勇気が、次の始まりを作る。",should:["関係・習慣・思考のうち「もう手放していいもの」を1つ書く","それを実際に終わらせる具体的なアクションをする"]}],海:[{m:"潜在意識の声",d:"深いところから何かが浮かんできてる。海の夢は「まだ言語化できてない感情や欲求」のサイン。",hint:"今日は直感で動いていい日。「なんとなくそっちがいい」という感覚を論理で上書きしないで。",should:["朝起きてすぐ、頭に浮かんだことを検閲なしで書き出す","「なぜか気になる」ことを今日1つ調べるか体験してみる"]},{m:"感情の深さ・豊かさ",d:"感受性が高まってる時期。浅いところでは満足できなくなってきてる。深く潜る準備ができてる。",hint:"今日は表面的な会話より「本音の話」をしたくなる日。信頼できる人と深い話をしてみて。",should:["近い人に「最近どう？」じゃなく「本当のところ何を感じてる？」と聞いてみる","自分自身にも同じ質問をして正直に答える"]},{m:"大きな流れへの信頼",d:"自分より大きな何かに委ねてもいいタイミング。全部コントロールしなくていい。流れに乗る。",hint:"今日は「頑張る」をやめて「受け取る」を意識して。求めなくても来るものがあると知って。",should:["今日何か良いことが起きたら素直に受け取る練習をする","「こうじゃないといけない」という思い込みを1つ書いて手放す"]}],花:[{m:"成長・開花",d:"何かが開こうとしてる。才能、関係、自己表現——今は「花開く」タイミング。",hint:"今日「これをもっと世に出したい」と思うものを1つ選んで、具体的な行動を1つ起こして。",should:["「もっと表現・発信・活躍したいこと」を1つ書く","そのための具体的な最初の行動を今日する"]},{m:"美・感受性",d:"美しいもの、好きなもの、心が喜ぶものへの感度が高まってる。",hint:"今日は意識的に「きれいだな」「好きだな」と感じるものを3つ見つけて。感受性は磨くほど豊かになる。",should:["今日感じた「美しさ・好き」を3つ日記に書く","心が喜ぶことを今日1つ意識的にする"]},{m:"一時性・儚さ",d:"今この瞬間の大切さに気づいてるサイン。花はいつか散る。今を大事にするタイミング。",hint:"今日会う人、見る景色、感じること——全部「今だけ」のもの。それを意識するだけで1日が変わる。",should:["今日の「一度しかない瞬間」を意識して過ごす","大切な人に今日「好き」「ありがとう」を伝える"]}],月:[{m:"直感・女性性",d:"直感と感受性が最も高まってる状態。月の夢は「内なる声に耳を傾けて」というメッセージ。",hint:"今日の決断は論理より感覚で。「なんかいい」「なんか違う」の感覚を最優先にして。",should:["今日気になった人・場所・モノにそのまま近づいてみる","気持ちが動いた瞬間を日記に記録する"]},{m:"秘密・内なる世界",d:"表に出せない感情や秘密が夢に出た。プライベートな内側の世界を大切にしてる証拠。",hint:"今日は誰にも見せなくていい自分だけの時間を30分作って。何もしなくていい、ただ自分だけでいる時間。",should:["誰にも見せない日記を1ページ書く","自分だけの「好き」を誰かに合わせず1つ満喫する"]},{m:"サイクル・変化",d:"月が満ち欠けするように、今あなたも変化のサイクルの中にいる。今はどの段階？",hint:"今日は「今の自分はどんな状態か」を客観的に見てみて。満月期？新月期？自分のリズムを知ると楽になる。",should:["自分の「最近のエネルギー状態」を数値化してみる(1〜10)","そのエネルギーに合った過ごし方を今日選ぶ"]}],猫:[{m:"孤独・自立",d:"一人の時間を求めてる、または孤独を感じてる。猫のように自分のペースで生きたいという欲求が出てる。",hint:"今日は誰かに合わせなくていい時間を意図的に作って。一人でいることへの罪悪感を手放して。",should:["今日数時間、完全に一人の時間を作る","「寂しい」と「一人が好き」は両立する。今どちらかを自分に認める"]},{m:"気まぐれ・自由",d:"縛られることへの拒否感が出てる。義務やルーティンが窮屈に感じてる時期。",hint:"今日は「やらなきゃ」を全部リストアップして、その中で本当にやらなくていいものを1つ消して。",should:["今日何か1つ「気が向かないからやらない」と決める","自分の気分に正直に行動してみる"]},{m:"独立・自己信頼",d:"誰かに頼りたい気持ちと、一人でやりたい気持ちが葛藤してる。どちらも正しい。",hint:"今日は「自分だけの判断」で何か1つを決めて。他人の意見を聞く前に、まず自分がどう思うか確認して。",should:["誰かに相談する前に「自分ならどうするか」を先に書いてみる","その判断を今日1つ実行する"]}],犬:[{m:"信頼・依存",d:"誰かを信頼したい、または信頼されたい欲求がある。今の関係の中で「安心」を求めてる。",hint:"今日大切な人に「ありがとう」と「好き」を伝えて。日常の中の当たり前に感謝を言葉にする。",should:["近い人に感謝の言葉を伝える","「信頼してる」と思える人との時間を意図的に作る"]},{m:"忠誠・傷つき",d:"誰かへの裏切りを感じてる、またはあなた自身が誰かを傷つけてしまったかもしれない。",hint:"今日「あの時こうすればよかった」と思ってることに向き合って。後悔は行動で清算できる。",should:["謝りたい人がいれば今日連絡する","自分の行動が相手にどう影響したかを考えてみる"]},{m:"友情・仲間",d:"仲間や友達が恋しい。または今の人間関係に何か違和感がある。",hint:"今日久しぶりに連絡を取りたかった人に、理由なくLINEして。「なんとなく思い出した」で十分。",should:["連絡してなかった友人に今日メッセージを送る","今の人間関係で「なんか違う」と感じてることを1つ正直に考える"]}],魚:[{m:"幸運・豊かさ",d:"幸運のサインが来てる。直感や機会に対してオープンでいる時期。",hint:"今日来た機会や誘いに、いつもよりYESと言ってみて。幸運は動いてる人のところに来る。",should:["今日来たチャンスや誘いに1つ積極的に応える","「ラッキー」と感じたことをその日のうちに記録する"]},{m:"感受性・流れ",d:"感情の流れに乗っていい時期。無理に押し付けずに自然に動いて。",hint:"今日は計画より「その時の感覚」で動いてみて。自然な流れを信じて。",should:["今日の予定を少し崩して、気分に従って動く時間を作る","「これをやりたい」という感覚に素直に従う"]},{m:"潜在能力",d:"まだ気づいてない自分の才能や可能性がある。水面下に大きな魚がいるように。",hint:"今日「これ得意かも」「楽しいかも」と感じることに注目して。それがあなたの潜在能力のヒント。",should:["自分が「なんとなく上手くいってること」を5つ書く","その中の1つをもっと伸ばすための行動を今日始める"]}],鳥:[{m:"解放・自由",d:"今いる場所から解放されたい欲求が強い。今のあなたにも飛び立つ準備ができてる。",hint:"今日「これがなければもっと自由なのに」と感じてるものを1つ書いて。自由の障害を明確にすると対策が立てられる。",should:["自由を妨げてる一番の要因を特定する","その要因を小さくするための行動を1つする"]},{m:"高い視点・俯瞰",d:"地上ではなく空から見る視点が必要。今の問題を一歩引いて見ると、違う景色が見えてくる。",hint:"今日悩んでることを「10年後の自分が振り返ったら」という視点で見てみて。小さく見えるはず。",should:["今の悩みを「10年後に重要か？」という基準で評価する","「森を見て木を見る」視点で今の状況を書き直す"]},{m:"希望・新しい始まり",d:"希望のサインが来てる。鳥は夜明けを知らせる。今のあなたにも夜明けが近づいてる。",hint:"今日「これが実現したら最高」と思えることをリアルに想像して。希望を具体的にすると現実になりやすい。",should:["実現したい未来を具体的に書く","その未来に向けて今日できる一番小さな行動を1つする"]}],雨:[{m:"浄化・感情の開放",d:"感情のデトックスが必要な時期。雨が大地を洗うように、今のあなたも浄化のサイン。",hint:"今日は感情を溜め込まないで。泣く、書く、話す、体を動かす——何でもいいから外に出して。",should:["感情を表現する方法を1つ今日選んで実行する","シャワーや雨の音を聴きながら「今感じてること」を頭の中で整理する"]},{m:"試練・困難",d:"今は雨の時期。でも雨が降らないと土は乾いて作物は育たない。今の困難には意味がある。",hint:"今日「この状況から何を学んでるか」を1つだけ書いてみて。雨の後には必ず虹が来る。",should:["今の困難から学んでいることを1つ書く","「これを乗り越えた後の自分」を具体的にイメージする"]},{m:"休息・内省",d:"外に出るより内側に向かう時期。雨の日は家で過ごすように、今は内省のタイミング。",hint:"今日は外向きの活動を減らして、自分の内側と向き合う時間を意識的に取って。",should:["静かな時間を作って「今の自分の状態」を正直に書く","「今何が必要か」を自分に問いかけて、その答えに従う"]}],友:[{m:"人間関係の投影",d:"今の人間関係への本音が夢に出た。誰かへの感謝、または不満や距離感が反映されてる。",hint:"今日「最近ちゃんと話せてないな」と思う人に連絡してみて。距離が縮まるほど心が豊かになる。",should:["久しぶりに連絡したい人に今日メッセージを送る","今の友人関係で「もっと大切にしたい関係」を1つ選んで行動する"]},{m:"孤独・孤立",d:"誰かとつながりたい気持ちが高まってる。または今の人間関係に物足りなさを感じてる。",hint:"今日「一人でいる」と「孤独を感じる」の違いを考えてみて。本当につながりたいのはどんな人？",should:["理想の人間関係を具体的に書く","そういう関係を作るための行動を1つ今日する"]},{m:"信頼・裏切り",d:"誰かへの信頼が揺らいでるか、または自分自身の誰かへの誠実さを問われてる。",hint:"今日「大丈夫？」と声をかけたい人に、実際にかけてみて。自分から動く勇気が関係を変える。",should:["気になってる友人・知人に今日連絡する","「信頼を深めたい関係」にどんな行動ができるか書く"]}],家:[{m:"アイデンティティ・居場所",d:"自分の「居場所」について考えてる時期。今いる環境が本当に自分に合ってるか確認するタイミング。",hint:"今日「ここが自分の場所だ」と感じる瞬間を意識して探してみて。安心できる場所は必ず存在する。",should:["「自分が本当に安心できる場所・人・状況」を書き出す","その環境を増やすための具体的な行動を1つする"]},{m:"家族・原点",d:"家族や育った環境が今の自分に影響してることへの気づき。そのパターン、今も繰り返してない？",hint:"今日「家族から受け継いだもの」を良いものと課題、両方書いてみて。見えてくるものがある。",should:["親や家族から学んだ「いいパターン」を1つ書く","繰り返してる「よくないパターン」を1つ認識する"]},{m:"安全・安定欲求",d:"心の中に「安全な場所」が必要になってる。外向きに頑張り続けた反動かも。",hint:"今日は誰かのための時間より「自分を回復させる時間」を優先して。充電なしに与え続けられる人はいない。",should:["今日は外からの刺激を最小限にして家でゆっくり過ごす","回復のための小さなルーティンを1つ作る"]}],学校:[{m:"評価・試される恐怖",d:"人に評価されることへの恐怖や基準に届かない不安が夢に出た。でも誰かの基準で生きなくていい。",hint:"今日「誰かの期待」ではなく「自分の基準」で行動してみて。あなたの「合格」はあなたが決める。",should:["今日自分で「これができたらOK」という基準を設定する","他人に認めてもらう前に自分で自分を認める"]},{m:"成長・学び",d:"新しいことを学びたい、スキルアップしたいという欲求がある。知識欲が高まってる時期。",hint:"今日気になってた「勉強・学び・スキル」に10分だけ触れてみて。始めることで続けられるようになる。",should:["気になってた分野の情報を今日調べ始める","新しいことを学ぶための小さな時間を毎日のルーティンに入れる"]},{m:"過去の後悔",d:"あの頃やっておけばよかったことへの後悔。でも今からでも遅くないことがほとんど。",hint:"今日「やり直したいこと」を「今からでもできること」に書き換えてみて。後悔は未来への行動指示書。",should:["後悔していることを「今からできること」に変換して書く","その中の1つに今日から取り組み始める"]}],車:[{m:"人生の方向性",d:"今の進み方、ペース、方向は自分が望むものか。誰かに運転させてない？",hint:"今日「今の方向で本当にいいか」を自問して。誰かに言われたままのレールを走ってるなら今すぐハンドルを握り直して。",should:["「今の人生の方向性」を自分の言葉で書く","もし方向を変えるとしたら、どこに向かいたいかを書く"]},{m:"コントロール・主体性",d:"自分の人生を自分でコントロールできてるか問われてる。受け身になりすぎてない？",hint:"今日1つだけ「自分で決める」を実践して。小さな選択権を積み重ねることが主体性を育てる。",should:["今日誰かの意見を聞く前に自分の意見を先に決める","「自分で決めた」と言える行動を1つ今日する"]},{m:"スピード・余裕",d:"速すぎるか遅すぎるか。自分のペースを見失ってないか確認するタイミング。",hint:"今日「今のペースは自分に合ってるか」を正直に評価して。速すぎるならブレーキを、遅すぎるならアクセルを。",should:["今の自分のペースを評価する（速すぎ・ちょうど・遅すぎ）","それに合わせた調整を1つ今日する"]}],死:[{m:"終わりと再生",d:"何かが完全に終わって、新しい何かが始まろうとしてる。死の夢は最高の変化のサイン。",hint:"今日「もう終わりにしていいもの」を1つ明確にして。終わらせる勇気が次の始まりを作る。",should:["終わりにすべき関係・習慣・思考を1つ書く","それを実際に終わらせる具体的なアクションを今日起こす"]},{m:"変革への恐怖",d:"大きな変化を前にして怖くなってる。変わることへの抵抗が「死」の形で出た。",hint:"今日恐れてる変化を具体的に書き出して。漠然とした恐れは書いた瞬間に小さくなる。",should:["変えたいけど怖くて変えられてないことを具体的に書く","その変化の「最悪のケース」と「最良のケース」を両方書いて現実的に見る"]},{m:"解放・浄化",d:"古い自分、古いパターン、古い関係を手放す準備ができてる。軽くなっていい。",hint:"今日「もう必要ない」と感じてるものを物理的に1つ捨てるか手放してみて。物を手放すと心も軽くなる。",should:["不要なものを1つ捨てる（物でも習慣でも思考でも）","「手放したあとの自分」がどう感じるかをイメージする"]}],赤ちゃん:[{m:"新しい可能性・始まり",d:"新しい何かが生まれようとしてる。アイデア、関係、自分自身の新しい側面。育てる準備ができてる。",hint:"今日「生まれたばかりのアイデア」を大切に扱って。批判や評価は後。まずは存在させてあげて。",should:["頭の中にある未熟なアイデアを誰かに話してみる","新しく始めたいことを1つ書いて、最初の小さな行動を今日する"]},{m:"インナーチャイルド",d:"内側の子供の部分が何かを求めてる。遊びたい、認めてほしい、甘えたい。そのニーズを無視してない？",hint:"今日「純粋に楽しい」と思えることを何の生産性も考えずにやってみて。大人の義務より子供の喜びを。",should:["今日純粋に楽しいことを30分だけやる","「楽しい」を言い訳なく追いかけていい許可を自分に出す"]},{m:"責任・負担",d:"新しい責任や重荷を引き受けることへの不安が出てる。全部引き受けなくていい。",hint:"今日「どこまでが自分の責任か」を見直して。助けを求めることも大事な能力。",should:["抱えてる責任を書き出して「自分がやるべきか」「他の人に頼めるか」を仕分けする","1つだけ誰かに助けを求める"]}],好き:[{m:"恋愛感情の投影",d:"誰かへの気持ち、または「誰かに好きでいてほしい」という欲求が夢に出た。感情を否定しないで。",hint:"今日気になってる人のことを考えたら、それを「サイン」として受け取って。感情は行動を促してる。",should:["気になってる人に、理由なく連絡してみる","自分が「どんな関係を求めてるか」を正直に書き出す"]},{m:"自己愛の欠如",d:"誰かに「好き」と言われたい欲求が高まってる。承認欲求は自己愛の裏返し。",hint:"今日自分に「よくやってる」と言ってみて。他人に言ってもらう前に、自分から始めていい。",should:["今日自分が頑張ったことを3つ書いて自分で承認する","「好かれるための行動」より「自分らしい行動」を1つ選ぶ"]},{m:"感受性・感情の豊かさ",d:"感情が豊かに動いてる状態。感じやすくなってるから良いことも辛いことも増幅されてる。",hint:"今日感情が動いた瞬間を大切にして。感受性は才能。鈍らせるより活かして。",should:["感情が動いた出来事を日記に書く","その感情を誰かと共有してみる"]}],元カレ:[{m:"未清算の感情",d:"過去の関係がまだ終わっていない部分がある。未練というより「学び残し」があるかもしれない。",hint:"今日その人から学んだことを1つだけ書き出して。過去は変えられないが、意味は変えられる。",should:["元カレとの関係から「自分が学んだこと」を1つ書く","今の自分に必要なことへ意識を向け直す"]},{m:"比較・理想像",d:"今の状況や相手と、過去を比べてる。でも過去は美化されやすい。今に集中する時期。",hint:"今日「今この瞬間」に意識を戻して。過去と比べても現在は変わらない。今に良いものを探して。",should:["今の環境・人間関係の「いいところ」を3つ書く","過去との比較をやめ、今と向き合う時間を作る"]},{m:"自己成長の確認",d:"あの頃の自分と今の自分を比べてる。成長を確認したい気持ちが夢に出た。",hint:"今日1年前の自分と今の自分を比べてみて。きっと変わってる。その変化をちゃんと認めてあげて。",should:["1年前と今で変わったことを5つ書く","自分の成長を誰かに話してみる（または日記に書く）"]}],元カノ:[{m:"未清算の感情",d:"過去の関係に感情の残りがある。それは後悔かもしれないし感謝かもしれない。",hint:"今日その人との関係で「ありがとう」と思えることを1つ見つけて。感謝に変えると過去が軽くなる。",should:["元カノとの思い出から「自分が学んだこと」を1つ書く","今必要な人間関係に意識を向け直す"]},{m:"自己理解",d:"その人を通して自分自身を見てた部分がある。今改めて「自分は何を求めてるか」を確認する時期。",hint:"今日「本当に求めてる関係性」を具体的に書き出して。理想像が明確になると現実が変わる。",should:["理想の関係性・パートナー像を具体的に書く","今の人間関係と比較して何が足りているか確認する"]},{m:"比較・葛藤",d:"今の自分と過去の自分を比較してる。または今の状況への不満が過去への後悔として出てる。",hint:"今日「今に感謝できること」を10個書いてみて。過去への執着は今への不満から来てることが多い。",should:["今日の「良いこと」を10個書く（小さなことでいい）","今自分が持っているものにフォーカスする"]}],知らない:[{m:"未知の自己",d:"自分でも気づいていない自分の側面が出てきた。その「知らない部分」があなたの次の可能性。",hint:"今日「自分にこんな一面があったのか」と感じる行動を1つしてみて。自分に驚く体験が成長を作る。",should:["やったことないことを今日1つだけ試してみる","「自分はこういう人間」という固定観念を1つ疑ってみる"]},{m:"不確実性への不安",d:"先が見えないことへの不安が夢に出た。でも「知らない」状態は可能性が最大になってる状態でもある。",hint:"今日「わからない」を「わからないまま進む」に変換して。確実性を待ってると何も始まらない。",should:["「答えが出るまで待つ」のをやめて、今できることを1つ動かす","不確実な状況に対して「最悪どうなる？」を現実的に書いて不安を小さくする"]},{m:"探求・好奇心",d:"知らない世界への好奇心が高まってる。その「気になる」感覚を行動に変えて。",hint:"今日ずっと気になってたけど調べてなかったことを1つ調べてみて。知識は行動より先に来る。",should:["気になってたことを今日調べ始める","新しい情報・人・体験に積極的に触れる機会を1つ作る"]}],怖:[{m:"変化への抵抗",d:"変化を求めてるのに、それが怖くて動けない矛盾が出てる。怖さは行動のサイン。 乗り換えるべきか。人生のルートに疑問を感じてる。",hint:"今日「このまま進んで5年後どうなるか」を具体的に想像して。そのビジョンにワクワクするかどうかが答え。",should:["今から5年後のビジョンを具体的に書く","「このままでいい」か「変える必要がある」かを正直に答える"]},{m:"流れに乗れない感覚",d:"周りの流れについていけてない焦りがある。でも全員が同じ電車に乗る必要はない。",hint:"今日は「乗り遅れた」ではなく「まだ次の電車が来る」と考えて。あなたのタイムラインはあなただけのもの。",should:["「遅れてる」と感じることのリストを作って現実的に見直す","自分のペースでできることを1つ今日進める"]},{m:"移行期・変化",d:"ある場所から別の場所へ移動中。今は過渡期。どこに向かうかを意識するタイミング。",hint:"今日「変化の途中にいる自分」を認めてあげて。不安定なのは動いてる証拠。止まってるより全然いい。",should:["今自分が「どこに向かおうとしてるか」を言語化する","その方向に向けて今日1つ具体的な行動をする"]}],鏡:[{m:"自己認識・本当の自分",d:"本当の自分の姿と向き合おうとしてる。鏡の夢は「自己認識のタイミング」のサイン。",hint:"今日は誰かの評価より「自分はどうありたいか」だけを考えて。答えは外にじゃなく内にある。",should:["「理想の自分」を具体的に書き出す","今日1つだけ、理想の自分がするであろう行動をする"]},{m:"自己評価・自信",d:"自分に対してどう評価してるかが問われてる。厳しすぎる自己評価が心を削ってない？",hint:"今日は自分に優しい言葉をかける練習を。友達に言えない言葉は自分にも言わないで。",should:["今日自分を責めたくなった時、同じことを友達が言ってきたらなんと返すか考える","自分の良いところを5つ書く"]},{m:"二面性・影",d:"表に出している自分と、隠している自分の間に葛藤がある。どちらも本物のあなた。",hint:"今日は少し「素の自分」を出してみて。完璧に見せようとしてる場面で、少しだけ弱さを見せると楽になる。",should:["信頼できる人に本音を1つ話してみる","「こうあらねば」という思い込みを1つ手放す"]}],お金:[{m:"価値観・安全欲求",d:"安定への不安、または自分の価値への疑問が夢に出た。お金の夢は「自己価値」と直結してることが多い。",hint:"今日「私には価値がある」と声に出してみて。信じてなくていい。口に出すことで脳が変わる。",should:["自分が提供できる「価値」を3つ書き出す","経済的な不安を具体的な数字で書き出して現実を確認する"]},{m:"欲求・野心",d:"もっと欲しい、もっと上へ。正当な欲求。それを認めてあげると行動が変わる。",hint:"今日「手に入れたいもの」を遠慮なく全部書き出して。欲しいと認める勇気が手に入れる第一歩。",should:["欲しいものリストを制限なく書く","その中で今月実現できるものを1つ選んで行動する"]},{m:"不安・執着",d:"お金への執着や不安が行動を縛ってる可能性がある。本当に必要なものを見極める時期。",hint:"今日「お金のためにやってること」と「本当にやりたいこと」を分けて書いてみて。ズレが大きいほど見直しが必要。",should:["今やってることの「なぜやるか」を全部書き直す","本当にやりたいことに向けて小さな一歩を踏み出す"]}],子供:[{m:"インナーチャイルド",d:"内側の子供の部分が何かを求めてる。遊びたい、認めてほしい、甘えたい。そのニーズを無視してない？",hint:"今日「純粋に楽しい」と思えることを生産性を考えずにやってみて。大人の義務より子供の喜びを。",should:["今日純粋に楽しいことを30分だけやる","「楽しいからやる」という理由だけで何かを選ぶ"]},{m:"純粋さ・無邪気さ",d:"複雑に考えすぎてる状態。子供のような純粋な視点が今のあなたに必要。",hint:"今日「なぜ？」と素直に疑問を持つ練習を。当たり前だと思ってることを疑うと新しいものが見える。",should:["当たり前だと思ってることに「なぜ？」と問いかけてみる","子供の頃好きだったことを今日1つ思い出してやってみる"]},{m:"創造性・可能性",d:"制限なしの発想、まだ形になっていないアイデアが生まれようとしてる。",hint:"今日は「どうせ無理」フィルターを外して、頭の中のアイデアを全部紙に出してみて。形にしてから評価して。",should:["アイデア 出せない。SNSで下書きばかり溜まってない？あなたの「本当は見てほしい」は、決して恥ずかしいことじゃない。",money:"「好きなものに静かに課金する」タイプ。派手な買い物はしないけど、推しのグッズ、お気に入りのブランド、こだわりのカフェ——「自分の世界」を豊かにするものには地味に使い続ける。貯金はそこそこできるけど、気づくと好きなものに溶けてる。ボーナスの使い道をすでに決めてるでしょ？",prophecy:"この3ヶ月は「発見される」時期。あなたが静かに続けてきたことが、誰かの目に留まる出来事が起きる。大きなステージじゃなくていい、「見てくれてる人がいた」と気づく瞬間がくる。そのために今やるべきことは、発信を止めないこと。"},earth_yang:{name:"ブレないボス",icon:"👑",sub:"決めたらやる。信頼度MAX",color:"#8B6F47",os:"「計画→実行→成果」のプロセスが組み込まれてる。やると決めたらやる。途中で投げ出すことが生理的にできない。あなたの脳は「信頼」を最も重要な通貨だと認識してて、約束を破ることは自分を裏切ることと同義。だから周りからの信頼が異常に厚い。",weapon:"「積み上げる力」。1年後、3年後を見据えて今日の1歩を踏める人。他の人が飽きて辞めた後も黙々と続けてる。マラソンランナー型の才能。プロジェクトマネジメント、経営、投資——長期戦で無類の強さを発揮する。",bug:"「柔軟性不足」。計画通りにいかないと異常にストレスがかかる。想定外の事態が起きた時、固まって「こんなはずじゃ」と立ち止まりがち。あと、人にも自分と同じ基準を求めすぎて、周りが萎縮してない？",handling:"この人との約束は絶対守って。一度信頼を失うと二度と取り戻せない。逆に、この人が「任せて」と言ったら本当に任せていい。中途半端が一番嫌いだから、お願いするなら全部任せる。途中で口を出すのは地雷。",update:"計画力は完璧。次のステージは「手放す力」。コントロールできないものまでコントロールしようとしてない？完璧な計画じゃなくても走り出す練習を。あなたの実行力があれば、走りながら修正できる。",bestMatch:"water_yang",bestMatchName:"七変化のちょうちょ",bestMatchWhy:"あなたの堅さに柔軟性を足してくれる",enemy:"wood_yang",enemyName:"頭脳派の小悪魔",enemyWhy:"どっちが正しいかの戦いになりがち",rx:["計画にない行動を1つだけ。予定外の楽しさを思い出して。","「まあいいか」を3回唱えて。完璧じゃなくても世界は回る。","誰かのミスを笑って許して。その余裕があなたの器を広げる。","今日のToDoを1つ削除。余白がクリエイティビティを生むよ。","計画を立てずにカフェに入って、メニューを直感で選んでみて。","「自分ルール」を1つだけ緩めて。その柔軟さが新しい発見を連れてくる。","夜は仕事のことを考えない。あなたの頭にも休息が必要。"],shadow:"「しっかり者」の鎧の裏に、「誰かに甘えたい」子どもがいる。いつも頼られる側だけど、本当はあなたも頼りたい。でも「こんなことで弱音を吐いたらダメだ」と自分に禁じてる。お酒を飲んだ時だけ本音が漏れてない？あなたが弱さを見せた瞬間、周りはもっと近づきたいと思ってるよ。",money:"「計画的に貯める」タイプ。家計簿つけてるか、頭の中に完璧な収支表がある。衝動買いはほぼゼロ。将来のために投資も勉強してるでしょ？弱点は「安いもので我慢しがち」なこと。たまには計画外の贅沢をしないと、人生がエクセルの表みたいになる。自分へのご褒美、月1でいいから許可して。",prophecy:"この3ヶ月は「土台が報われる」時期。コツコツ積み上げてきたものが周りに認められる出来事がある。昇進、契約、信頼——「あなただから任せたい」と言われる瞬間。ただし2ヶ月目に想定外が来る。計画が崩れても慌てないで。あなたの実行力なら立て直せる。"},earth_yin:{name:"癒しの守護天使",icon:"🌸",sub:"あなたがいるだけで、みんな安心",color:"#9B7B4A",os:"「守る」が最優先タスク。大切な人、自分の居場所、日常の安定——これらが脅かされると全力で守りに入る。あなたの安心感は天然もので、一緒にいるだけで人の肩の力が抜ける。でも自分のことは後回しにしがちで、気づいたら疲弊してることが多い。",weapon:"「安心感の塊」。あなたがいるとチームの心理的安全性が爆上がりする。相談しやすい、弱みを見せやすい、失敗しても責めない——この空気を作れるのは才能。カウンセラー、教育、バックオフィス、チームマネジメントで真価を発揮する。",bug:"「変化への恐怖」。今あるものを守りたいあまり、新しいことに踏み出せない。「現状維持でいいじゃん」が口癖になってない？あと、自分を犠牲にして他人を守ろうとする癖。守る側が倒れたら、守るべきものも守れない。",handling:"この人に急な変化を押し付けないで。変化は小出しに、予告してから。「来月からこう変わるよ」と事前共有するだけで受け入れ方が全然違う。あと、この人が「疲れてない」って言ったら疲れてる。定期的に休ませて。",update:"守る力は最強クラス。次は「自分を守る」のアップデート。「NO」を言う練習を。全部引き受けなくていい。あなたが元気でいることが、周りの人にとって一番の安心材料だから。",bestMatch:"fire_yin",bestMatchName:"秘めた情熱家",bestMatchWhy:"あなたの安定とあの人の情熱が最高のバランス",enemy:"fire_yang",enemyName:"炎のカリスマ",enemyWhy:"振り回されて疲弊する",rx:["自分のために30分使って。あなたにはその権利がある。","「NO」を1回だけ練習。小さなお願いでいいから断ってみて。","変化を1つだけ受け入れてみて。新しいカフェ、新しいルート。","「自分は十分頑張ってる」って声に出して。本当のことだから。","今日は誰かのお世話をしない時間を作って。自分をケアして。","好きな食べ物を自分のためだけに用意して。あなたも大切にされていい。","「変わること」を1つポジティブに捉えてみて。成長は変化の中にある。"],shadow:"「優しくて穏やか」の裏に、「変わりたくない」への執着がある。新しい人、新しい環境、新しい自分——全部が脅威に感じる。あと、自分を犠牲にして人を助ける裏には「必要とされないと存在価値がない」という恐れが隠れてる。誰かのためじゃなくて、自分のために生きていい。",money:"「安定が正義」タイプ。毎月決まった額を貯金してるか、固定費をきっちり管理してる。突然の大きな出費がストレス源。保険に入りすぎてない？安心を買いたい気持ちは分かるけど、「もしもの時」に備えすぎて「今」を楽しめてないなら本末転倒。たまには自分に投資して。",prophecy:"この3ヶ月は「殻を破る」タイミング。安定を手放すのは怖いけど、小さな変化を1つ起こすと、思ってたより世界が優しいことに気づく。特に人間関係で新しい風が吹く予感。あなたが「大丈夫かな」と不安に思ってることの90%は、大丈夫。"},metal_yang:{name:"こだわりの魔法使い",icon:"💎",sub:"妥協？ありえない。全部こだわる",color:"#7B6B9E",os:"「美しくないものは存在してはいけない」が根本設定。仕事の質、見た目、人間関係の在り方——すべてに美意識がある。中途半端が生理的に無理で、やるなら完璧じゃないと気が済まない。その妥協のなさが最高の結果を生む。でも自分も周りも追い詰めることがある。",weapon:"「クオリティの鬼」。あなたが手がけたものは、誰が見ても完成度が高い。デザイン、編集、品質管理、専門職——「仕上げの精度」で勝負する場面で無敵。「あの人に任せれば間違いない」という評価は、あなたが積み上げた信頼の証。",bug:"「完璧じゃないと出せない症候群」。80点のものを出すくらいなら出さないほうがマシ、って思ってない？それ、チャンスを逃してる。あと、他人の仕事のクオリティが気になりすぎて、口を出して嫌われるパターンに注意。",handling:"この人の仕事に雑なフィードバックは禁物。「なんか違う」じゃなくて「ここをこうしてほしい」と具体的に。あと、この人が提出期限を延ばしてきたら、それはサボりじゃなくてクオリティを上げようとしてる。信じて待つか、「この段階で一旦見せて」と言うのが正解。",update:"完璧を目指す力は一流。次は「不完全を愛する力」。SNSに下書きじゃなくていきなり投稿する、部屋を完璧に片付けなくてもOKにする——小さな「まあいっか」が、あなたを自由にする。",bestMatch:"water_yin",bestMatchName:"ひらめきの預言者",bestMatchWhy:"あなたの精度とあの人の直感が最強の組み合わせ",enemy:"fire_yang",enemyName:"炎のカリスマ",enemyWhy:"雑すぎて見てられない",rx:["80点で提出する練習。完璧は幻。出してから磨けばいい。","誰かの「いい加減さ」を楽しんでみて。その余白に学びがある。","鏡の自分に「 まってくる。"},water_yang:{name:"七変化のちょうちょ",icon:"🦋",sub:"どこでも馴染む。誰よりも空気を読む",color:"#3A7DA8",os:"「環境に合わせて最適化する」が自動実行されてる。転職しても、引っ越しても、初対面のグループに入っても、気づいたら馴染んでる。この適応力は天才的だけど、本当の自分がどれか分からなくなることがある。カメレオンの才能と、アイデンティティの迷子が共存してる。",weapon:"「どこでも生きていける力」。組織でもフリーでも、国内でも海外でも、あなたはどこに放り込まれても結果を出せる。企画、営業、マネジメント、クリエイティブ——ジャンルを超えて活躍できる希少な才能。「何でもできる」は最強のスキル。",bug:"「合わせすぎて自分がなくなる」。誰かの前の自分、友達の前の自分、恋人の前の自分——全部違う人格になってない？それは適応力じゃなくて消耗。あと、「深くハマれない」問題。広く浅くなりがちで、専門性が育ちにくい。",handling:"この人に「あなたって結局何がしたいの？」は地雷。本人が一番悩んでるから。代わりに「今一番楽しいことは？」と聞いてあげて。あと、この人の意見が毎回変わっても怒らないで。更新されてるだけ。",update:"適応力は完成されてる。次のステージは「軸」を作ること。「これだけは譲れない」を3つ書き出して。環境が変わっても変わらない自分の核が見つかると、適応力がさらにパワーアップする。",bestMatch:"earth_yang",bestMatchName:"ブレないボス",bestMatchWhy:"あなたに「軸」を教えてくれる存在",enemy:"metal_yin",enemyName:"涙もろい共感の天使",enemyWhy:"お互い相手に合わせすぎて何も決まらない",rx:["「自分はどうしたい？」を3回自分に聞いて。他人の期待は一旦無視。","1つのことに2時間だけ集中。浅く広くを今日は封印。","誰にも合わせない時間を作って。一人カフェ、一人映画。","「変わっていい」と自分を許して。昨日の自分と違っても大丈夫。","日記に「今日の本音」を1行だけ書いて。飾らなくていい。","「これだけは好き」を1つ確認して。それがあなたの軸になる。","今日は誰のためでもなく、自分のためだけに何かをして。"],shadow:"「誰とでもうまくやれる」の裏に、「本当の自分では愛されない」という恐怖がある。環境に合わせて自分を変えるのは、素の自分を出したら受け入れてもらえないと思ってるから。全員に好かれてるように見えて、「本当の友達いるのかな」と夜中に考えることがあるでしょ？",money:"「流れに任せる」タイプ。入ってきた分だけ使う、あれば使うなければ使わない。計画性はほぼゼロだけど、不思議とお金に困らない運の持ち主。問題は「何にいくら使ったか分からない」こと。気づいたら月末に残高がゼロ。自動引き落としの貯金だけはやっておいて。それだけで人生が変わる。",prophecy:"この3ヶ月は「軸が見つかる」時期。ずっと探していた「これだ」という感覚が、思わぬ形で降りてくる。それは仕事かもしれないし、人かもしれないし、場所かもしれない。1ヶ月目はまだ霧の中だけど、2ヶ月目に急に視界が開ける。焦らず漂って大丈夫。"},water_yin:{name:"ひらめきの預言者",icon:"🔮",sub:"言葉にできない直感が、全部当たる",color:"#4A6FA5",os:"表面じゃなくて深層で世界を感じてる。言葉にならない直感、説明できない「なんとなく」、論理じゃ到達できない真実——あなたの知覚は他の人より2層くらい深い。その深さが孤独を生むけど、あなたにしか見えない世界がある。",weapon:"「見えないものを見る力」。他人の本音、プロジェクトの落とし穴、時代の空気——データじゃ掴めないものをキャッチする。占い師、セラピスト、研究者、アーティスト——「深く潜る」仕事で唯一無二の成果を出す。あなたの直感は、他人の分析100時間分の価値がある。",bug:"「現実世界との接続が不安定」。深く考えすぎて日常のタスクが疎かになったり、人の話を聞いてるようで頭の中は別世界にいたり。あと「理解されない孤独」。あなたの世界が深すぎて、言語化が追いつかないもどかしさ。",handling:"この人に「もっと現実を見て」は最悪のアドバイス。見てるものが違うだけで、見えてないわけじゃない。あと、この人が「なんとなくやめたほうがいい」と言ったら、理由を聞かずに信じて。大体当たってる。",update:"直感力は完成の域。次は「言語化」と「接地」。感じたことをノートに書く習慣を。書けなくても絵でも図でもいい。あなたの内なる世界が外に出た時、それは誰も作れないコンテンツになる。",bestMatch:"metal_yang",bestMatchName:"こだわりの魔法使い",bestMatchWhy:"あなたのビジョンを完璧な形に仕上げてくれる",enemy:"fire_yang",enemyName:"炎のカリスマ",enemyWhy:"スピードについていけなくて置いてかれる",rx:["直感が囁いたことをメモして。理由は後から分かる。","裸足で地面に立って。グラウンディングであなたのアンテナが安定する。","深く潜りすぎたら浮上して。映画、散歩、料理で「今ここ」に戻って。","「分かってくれなくていい」と割り切って楽になろう。あなたの世界はあなたのもの。","今日のインスピレーションを絵か言葉にしてみて。形にすると力が宿る。","現実的なタスクを1つだけ片付けて。地に足をつける練習。","静かな場所で10分だけ目を閉じて。あなたの直感がリセットされる。"],shadow:"「不思議ちゃん」の仮面の裏に、「普通になりたい」願望が隠れてる。みんなが盛り上がってることに興味を持てない自分、説明しても分かってもらえない自分——「なんで自分はこうなんだろう」と思ったこと、何回もあるでしょ？でもその「普通じゃなさ」が最大の才能だと気づいた時、あなたは無敵になる。",money:"「お金に無頓着」タイプ。物質的な豊かさより精神的な豊かさが大事で、お金の話が苦手。通帳の残高をあまり見ない。でもなぜかお金が必要な時に不思議と入ってくる運の持ち主。弱点は現実的な金額計算。月々の固定費すら把握してないことがある。まず月の支出を1回だけ計算してみて。",prophecy:"この3ヶ月は「直感が冴え渡る」時期。あなたの「なんとなく」の精度がさらに上がる。特に人間関係で「この人だ」と感じる出会いがある。それは恋愛かもしれないし、仕事のパートナーかもしれない。頭で考えず、心が反応した方向に進んで。3ヶ月後に「あの直感は正しかった」と確信する。"}};function generateMonthlyLetter(userSign,userName){const now=new Date();const y=now.getFullYear();const m=now.getMonth();const signIdx=SIGNS.findIndex(s=>s.k===userSign);const seed=y*100+m+signIdx*31;const rng=makeSeededRandom(seed);const pick=arr=>arr[Math.floor(rng()*arr.length)];const monthNames=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];const seasonWord=m<=1||m===11?"冬の":m<=4?"春の":m<=7?"夏の":"秋の";const greetings=[seasonWord+"空の下、今月もあなたに届けたい言葉があります。","新しい月が始まったね。先月のあなた、よく頑張ってた。今月はもっといい月にしよう。","今月のあなたに、星が伝えたがってることがあるよ。大事に読んでね。",monthNames[m]+"のあなたへ。忙しい毎日の中で、ちょっとだけ立ち止まって読んでほしい。","今月もおたより届けるね。あなたの星を読んで、ちゃんと書いたから。"];const overviews={おひつじ座:["今月は「動」の月。じっとしてられないエネルギーが溢れてる。迷う前に動いて正解。でも全力で突っ走ったあとは、ちゃんと休む日を作ってね。","今月は新しい出会いや挑戦に縁がある月。怖がらなくて大丈夫。あなたの行動力が周りを巻き込んで、思った以上にいい方向に転がるよ。","少しペースを落としてみて。あなたの直感は今月も鋭いけど、走りすぎると大切なものを見落とす。意識的に「待つ」時間を作って。","先月から引きずってるモヤモヤ、今月中にスッキリさせて。答えを出す勇気があなたには必ずある。動くか、手放すか、どっちかを決めるだけでいい。","今月のあなたはパワーが全開。でもそれは、周りを振り回すパワーじゃなくて、自分の夢に向かうパワーとして使って。方向さえ合えば最強の月になる。"],おうし座:["今月は自分への投資が実を結ぶ月。美味しいもの食べて、好きな場所に行って、五感を満たして。それが一番の開運法。","変化の波が来てるけど、焦らなくて大丈夫。あなたのペースで受け入れていけばいい。無理に合わせなくていいから。","コツコツ積み上げてきたものが形になるサイン。「まだまだ」って思ってるかもだけど、周りはちゃんとあなたの頑張りを見てるよ。","心地いい場所から一歩だけ踏み出してみて。無理に大きく変わらなくていい。「いつもと違う選択」を一つだけするだけで、世界が広がる。","今月は「本物かどうか」を見極める感覚が冴える月。人間関係もお金の使い方も、本当に価値があるものだけを残していく作業。直感を信じて。"],ふたご座:["今月は情報感度がいつも以上に高い。気になること全部メモして。その中に来月のあなたを救うヒントがある。","人との会話から大きなチャンスが生まれる月。話すこと、聞くこと、全部がつながっていく。コミュニケーションに全力で。","選択肢が多すぎて迷う月。でもどれを選んでもハズレはないよ。直感で「これ」って思ったものを信じて。","今月は「深める」がテーマ。広く浅くが得意なあなただけど、一つのことに集中してみると、自分でも知らなかった才能が出てくる。","頭の回転が全開の月。アイデアが湧いてきたら、流さずにちゃんと形にして。誰かに話すか、メモするか。動かないともったいないよ。"],かに座:["今月は「自分を守る」がテーマ。人に優しくする前に、まず自分に優しくして。あなたが元気じゃないと、誰も助けられないでしょ？","大切な人との関係が深まる月。ちょっと勇気を出して本音を言ってみて。相手もきっとそれを待ってる。","感情の波が大きくなりやすい月。でもそれはあなたの感受性が豊かな証拠。波に飲まれそうになったら、一人の時間を作ってリセットして。","過去の出来事をいつまでも抱えてない？今月は「もういいや」と手放す練習の月。ちゃんと消化されてない感情があるなら、今月中に向き合って。","誰かのために頑張りすぎてるあなたへ。今月は自分のために時間とお金を使っていい月。罪悪感なんていらない。自己投資が一番の開運だよ。"],しし座:["今月はあなたが主役の月。遠慮しないで。やりたいことをやって、言いたいことを言って。そのエネルギーが周りもいい方向に引っ張る。","プライドが邪魔して素直になれない場面があるかも。でも「ごめん」と「ありがとう」が言えたら最強。今月のテーマは素直さ。","注目を浴びる場面が増える月。自信を持って堂々としてればいい。あなたのオーラに惹かれる人が現れるよ。","今月は「誰かの役に立てた」という実感が、あなたを一番輝かせてくれる。見返りを求めず動いた分だけ、後から大きなものが返ってくる月。","やりたいことリストの中で、ずっと後回しにしてるものはない？今月はそれに手をつける月。完璧じゃなくていいから、まず始めるだけでいい。"],おとめ座:["今月は完璧を目指さなくていい月。70点の自分を許してあげて。それだけで気持ちが楽になるし、意外と周りも気にしてないから。","分析力が冴える月。でも考えすぎて動けなくなるのだけ注意。「えいっ」と動いた先に答えがあるよ。","誰かの役に立てる場面が多い月。あなたの気配りと正確さは、誰にも真似できない才能。でも頑張りすぎないでね。","今月は「自分を批判する声」に気づいて、そっとシャットアウトする練習をして。あなたが思ってるより、あなたは十分できてるよ。","細かいことが気になる感覚が強まる月。でもそれは弱さじゃなくて、見逃せないほど繊細に世界を受け取ってるってこと。その感覚を仕事や創造に活かして。"],てんびん座:["今月は自分軸を大事にして。誰かに合わせすぎてない？「私はこうしたい」を言葉にする練習の月。","美意識が高まる月。ファッション、インテリア、人間関係。「美しいかどうか」が判断基準になるよ。","バランスを取ろうとして疲れたら、あえて偏っていいから。全部均等にしなくていい。今月は好きなほうに振り切って。","今月は「断る」ことが開運になる月。無理な誘いや、本当はやりたくないお願いをさらっと断れたら、自分でも驚くくらい気持ちが軽くなる。","誰かとの比較で落ち込みやすい時期。でもあなたの「選ぶ目」と「整える力」は誰にも真似できない才能。人と比べる暇があったら、自分の好きを磨いて。"],さそり座:["今月は深い感情と向き合う月。表面的な付き合いに疲れてるなら、思い切って本音を出してみて。あなたの深さを受け止めてくれる人がいる。","直感がいつも以上に鋭い月。「なんか違う」と感じたことは全部当たってるよ。自分のセンサーを信じて。","手放すことで新しいものが入ってくる月。執着してるものがあるなら、今月がリリースのタイミング。","信頼できる人とそうじゃない人が、今月はっきり見えてくる。答え合わせの月だよ。傷つくかもしれないけど、わかってよかった、に変わる。","今月のあなたは磁力が強い。人を引き寄せる力も、感情の強度も、いつもの倍。この力を壊すことじゃなくて、創ることに使うと最高の月になる。"],いて座:["今月は冒険心が爆発する月。やったことないこと、行ったことない場所、会ったことない人。全部が新しい扉を開いてくれる。","自由に動けるエネルギーがある月。でもスタートダッシュだけで終わらせないで。今月始めたことを来月もちゃんと続けて。","退屈は敵。でも「面白くないな」と思ったら、面白くする側に回って。あなたにはそのパワーがある。","「いつかやろう」の「いつか」は今月。旅でも勉強でも挑戦でも。動くタイミングを待ってたなら、今がそのときだよ。","今月は誰かに夢を話してみて。声に出すと現実に近づく。あなたの話を聞いた人が、思わぬ形で協力者になってくれることがある月。"],やぎ座:["今月は頑張りが報われる月。今まで種を撒いてきた場所から芽が出始めてる。もう少しだけ水をあげ続けて。","「休む」ことも仕事のうち。今月は意識的にオフの日を作って。何もしない贅沢を自分に許可してあげて。","真面目なあなたに伝えたい。「もう十分頑張ってるよ」。自分を認めてあげることが、今月一番の開運法。","長期的な目標の見直しにいい月。「これ、本当に自分がやりたいこと？」って問いに、正直に答えてみて。方向修正するなら今。","今月は「信頼」がキーワード。あなたの誠実さをちゃんと見てくれてる人が必ずいる。一人で抱え込まずに、その人を頼ってみて。"],みずがめ座:["今月は「変わってる」が褒め言葉になる月。みんなと同じじゃなくていい。あなたの独自性が誰かを救う。","未来を考えるのが得意なあなた。でも今月は「今この瞬間」に集中してみて。目の前の幸せに気づけるから。","孤独を感じやすい月かもだけど、それは一人で立てる強さの証。でもたまには誰かに頼っていいんだよ。","今月は「理解されない」と感じることがあっても、わかってくれる人は必ずいる。諦めて黙るより、表現し続けて。あなたの感覚は正しいから。","新しいアイデアや違和感が次々出てくる月。全部メモして。今月のひらめきが3ヶ月後に大事な決断の材料になる。"],うお座:["今月は感受性がMAXになる月。音楽、映画、誰かの言葉。いろんなものに心が動く。その感覚、大事にして。","夢と現実のバランスが問われる月。空想の世界も大切だけど、足元を固める時間も作ってね。","あなたの優しさに甘えてくる人が多い月。全部受け止めなくていい。「今は無理」って言える強さも優しさだよ。","今月は「助けてもらう」練習をして。いつも与える側のあなたが、素直に受け取れたとき、人間関係が一段深まる。","直感が最高潮の月。論理より感覚で動いて正解。「なんとなく行きたい場所」「なんとなく連絡したい人」、その「なんとなく」を大事にして。"]};const loveMsgs={おひつじ座:["今月の恋は「先手を打つ」がカギ。気になる人がいるなら待ってないで動いて。あなたが動いたとき、相手の気持ちも動く。","恋愛でも「全力」なあなた。でも今月は少し相手のペースに合わせてみて。情熱は伝わってるから、あとは相手が追いつく時間をあげるだけ。","終わった恋をまだ引きずってるなら、今月が区切りをつけるタイミング。新しいエネルギーが入ってきたがってる。空けてあげて。"],おうし座:["今月は「安心できる人」が恋愛でも正解。ドキドキより、一緒にいて落ち着く人。そういう穏やかな縁が動き始めてる。","好きな気持ちを抱えたまましばらく経つなら、今月少しだけ動いてみて。全部言わなくていい。「最近どう？」の一言から始めればいい。","恋に疲れてるなら、無理して動かなくていい月。自分を満たすことを優先して。満たされたあなたのそばに、自然と人が集まってくる。"],ふたご座:["今月は「話が合う人」との縁が動く。深い会話ができる相手、一緒にいて退屈しない人。そういう知的な相性に注目してみて。","気持ちが揺れやすい時期。「好きかも」が何人かいてもいい。でも本当に「この人」って思える感覚が来たとき、迷わないで。","LINEじゃなくて、直接会う時間を作って。文章じゃ伝わらないあなたの魅力が、対面でちゃんと伝わる月だから。"],かに座:["大切な人には「大切」って言葉で伝えてみて。態度で示してるのはわかってる。でも言葉は、思ってるより相手の心に深く届くよ。","今月は「安全な恋」より「本当の恋」を選んで。傷つくのが怖くて踏み出せないなら、その怖さと一緒に動いてみて。怖さの先に本物がある。","相手に尽くしすぎて疲れてきてない？今月は「してもらう」練習をして。わがままを言える関係のほうが、長続きするから。"],しし座:["今月は堂々と好意を見せていい月。「好きかもしれない」なんて曖昧にせず、ちゃんと向き合って。あなたの真っ直ぐさが相手を動かす。","恋愛でも「認めてほしい」気持ちが出やすい月。でも認められるより、認める側に回ってみて。そのほうが不思議と愛が深まる。","今のパートナーや気になる人に、最近ちゃんと感謝を伝えてる？「いてくれてありがとう」の一言が今月すごく効く。"],おとめ座:["相手の粗探しをしてしまいがちな月。でも「完璧な人」は存在しない。その人の何が好きか、もう一度思い出してみて。","今月は自分磨きが恋愛運を上げる。新しいコスメ、お気に入りの服、居心地のいい場所。自分を丁寧に扱うことで、内側から輝き始める。","恋愛で悩んでることをノートに書き出してみて。頭の中で考えるより、書いたほうがスッキリして、答えが見えやすくなるよ。"],てんびん座:["今月は「この人でいいのかな」ではなく「この人がいい」と思える恋を選んで。消去法じゃなく、ちゃんと惹かれてる人に目を向けて。","恋愛でも「調整」しすぎてない？相手に合わせることが当たり前になってるなら、今月は自分の本音を一つだけ出してみて。","美しいデート体験が恋を深める月。行きたい場所、食べたいもの、どんどんリクエストして。あなたのセンスが相手を喜ばせる。"],さそり座:["今月は「信頼できるか」を見極める感度が鋭い月。曖昧な関係に答えを出すとき。はっきりさせることで、どちらに転んでも前に進める。","執着してる恋があるなら、一度冷静に見てみて。「好き」と「慣れ」と「依存」は違う。今月その区別がつくようになる月。","深く愛せる人だからこそ、嫉妬も独占欲も人一倍強い。でもそれを相手に向けすぎると窮屈になる。今月は信頼することを選んでみて。"],いて座:["今月は「自由でいさせてくれる人」との縁が動く。束縛や干渉が多い関係からは少し距離を置いて、心が軽くなる方向を選んで。","好きな人ができたら、遠慮なく全力で動いていい月。断られても傷つかない。あなたの明るさはどんな結果でもリカバリーできるから。","恋より楽しいことが多い月かもしれないけど、それはそれでいい。自分が輝いてるとき、好きな人から自然と連絡が来たりする。"],やぎ座:["今月は「長く一緒にいられるか」という目線で人を見てみて。今だけ楽しい恋より、未来を一緒に歩けそうな人。そういう縁に気づく月。","恋愛を後回しにしがちなあなたへ。仕事や目標も大事だけど、今月だけは気になる人への連絡を先に返してみて。","好きな人に弱みを見せることが怖い？今月はちょっとだけ鎧を脱いでみて。完璧じゃない部分を見せたとき、相手はもっとあなたに近づきたくなる。"],みずがめ座:["今月は「普通の恋愛」じゃなくていい。あなたにしか感じられない特別な縁、独自のやりとり、二人だけの世界観。そこに本物の愛がある。","恋愛において「理解されない」と感じてるなら、説明しすぎなくていい。あなたをそのまま受け入れてくれる人が、ちゃんといる。","フレンドシップから始まる恋に縁がある月。「友達以上かも」と気づく瞬間が来たら、見過ごさないで。"],うお座:["今月は感情がダイレクトに伝わる月。「なんとなくあなたのことが頭にある」それだけで伝えてみて。言葉より気持ちが届く時期だから。","理想が高いあなたに伝えたい。完璧な人じゃなくていい。一緒にいるとなんか安心する、それだけで十分な理由になる。","今月は「受け取る」練習を。好意を向けられたとき「なんで私に？」って疑わないで、素直にありがとうと言ってみて。"]};const moneyMsgs={おひつじ座:["衝動買いが多くなりやすい月。「今すぐ欲しい」気持ちが強いときほど、一晩待って。朝起きてもまだ欲しかったら買っていい。","今月は「体験」にお金を使うのが正解。物より思い出。行ってみたかった場所、やってみたかったこと、そこへの投資は必ず返ってくる。","大きな買い物は今月後半に。月初は衝動的になりやすいから、欲しいものリストに追加して寝かせてみて。"],おうし座:["今月は「本物にだけお金を使う」を意識して。安くて質が低いものを何個も買うより、少し高くても長く使えるものを一つ。あなたの審美眼を信じて。","美容や食への投資が特に効く月。ケチらないで。自分を喜ばせるためのお金は、最終的に自信という形で返ってくるよ。","固定費の見直しにいい月。使ってないサービス、更新したままのサブスク。整理するだけで気持ちもスッキリする。"],ふたご座:["今月は「情報への投資」が当たる月。本、講座、セミナー。知識にお金を使った分だけ、来月以降の選択肢が広がるよ。","細かい出費が積み重なりやすい月。カフェ代、移動費、ちょっとした買い物。週一でレシートをチェックするだけで変わる。","友達との食事や遊びにお金がかかる月。でも人間関係への投資は惜しまないで。そのつながりが思わぬところで助けてくれる。"],かに座:["今月は「安心」に投資していい月。居心地のいい家、好きな香り、自分がほっとできる環境。そこへのお金は贅沢じゃなくて必需品。","誰かのためにお金を使いすぎてない？今月は自分への出費を意識的に増やして。あなたが満たされてないと、与えることもできなくなる。","将来への不安からお金を握りしめすぎてない？貯めることも大事だけど、今の幸せにも使って。バランスが大事な月。"],しし座:["今月は「見た目への投資」が開運につながる月。新しいコーデ、ヘアスタイル、部屋の雰囲気。外から変えると内側の自信が変わる。","奢ったり、プレゼントしたり、気前よく使うと後から大きくなって返ってくる月。ケチると逆効果だから、太っ腹でいって。","大きな買い物を検討中なら今月中に決断して。タイミングが合ってる月だから、迷ってる時間がもったいない。"],おとめ座:["今月はお金の管理が得意なあなたの力が全開。家計簿つけたり、節約したりするのが特に捗る月。でも締めすぎず、楽しみにも使ってね。","「もったいない」精神が仇になりやすい月。使わないものはいっそ手放して。物を減らすことで、本当に必要なものが見えてくる。","スキルアップへの投資が後から大きく返ってくる月。資格、勉強、ツール。将来の自分への先払いだと思って。"],てんびん座:["今月は「美しいもの」へのお金が心を豊かにする。お花を買う、いい器を使う、お気に入りの場所でコーヒーを飲む。そういう小さな贅沢を大切に。","誰かと割り勘でモヤっとした経験があるなら、今月は最初にお金の話を決めてしまって。後からのモヤモヤを避けるほうが人間関係のためになる。","衝動買いよりも「計画した贅沢」が満足度を高める月。欲しいものリストを作って、一週間後にまだ欲しかったら買う、これだけで後悔が減る。"],さそり座:["今月は「隠れた価値」を見抜く目が冴える月。掘り出し物を見つけるのも、投資先を見極めるのも、あなたの感覚が一番頼りになる。","誰かへの不信感からお金をケチってしまいそうな場面がある。でも本当に価値のある相手やサービスには、ちゃんと払う価値がある。","今月は「捨てる」でお金が動く。不用品を売ったり、断捨離したりすることで、新しいお金の流れが生まれる。"],いて座:["今月は「体験」と「旅」にお金を使うのが最高の投資。そこで得た経験は必ずあなたの財産になる。お金を使うことを恐れないで。","計画なく使いすぎやすい月。大まかでいいから今月の予算を決めておいて。「旅費：○万、食事：○万」それだけでだいぶ変わる。","友達を誘う側になることが多い月。ノリで奢りすぎると後から後悔するから、楽しむことと財布のバランスだけは意識しておいて。"],やぎ座:["今月は長期的なお金の計画を立てるのにいい月。来年、3年後、5年後。漠然とした不安を「具体的な目標」に変えるだけで気持ちが落ち着く。","頑張った自分へのご褒美を我慢しすぎてない？今月は一つだけ、ちゃんと欲しいものを買っていい。それが次のモチベーションになる。","信頼できる人からお金のアドバイスをもらうのにいい月。NISAや積立、保険の見直し。今動き始めることで将来が変わる。"],みずがめ座:["今月は「未来への投資」が特に効く月。新しいスキル、異分野の知識、ニッチな趣味。誰もやってないことへのお金が後から大化けする。","社会や環境に配慮した使い方を意識してみて。フェアトレード、サステナブルなブランド。自分の価値観に合ったお金の使い方が気持ちよくなる。","お金に執着しすぎないで。必要な分はちゃんと入ってくる月だから、「足りない」より「どう使おう」という発想で動いて。"],うお座:["今月は「感性を満たす」お金の使い方が吉。美術館、映画、好きな作家の本。魂が喜ぶ使い方をすると、後から豊かさが戻ってくる。","誰かに頼まれると断れなくてお金が出ていきやすい月。「今月は余裕がなくて」って一言だけ言えるようになると、だいぶ楽になるよ。","漠然とお金の不安を感じやすい時期。でも具体的に書き出してみると意外と大丈夫なことが多い。まず現状を把握することから始めて。"]};const actionMsgs={おひつじ座:["「やろうと思ってたけどずっとやってないこと」を今月一つだけ、5分だけやってみて。動き出した勢いがあなたを本当に変える。","体を動かすことをルーティンに入れてみて。ジムじゃなくていい。毎日10分歩くだけでいい。体が整うと気持ちも整う。","苦手な人に先から話しかけてみて。あなたから動いたとき、関係が予想外に良くなることがある月。"],おうし座:["お気に入りのカフェや場所に、いつもより少し長く滞在してみて。急がない時間が、今月のあなたに必要なものを運んでくる。","部屋に生花を一輪置いてみて。視覚から入る美しさが、日常の中の幸福感を底上げしてくれる。","今月は「味覚」を意識して丁寧に食べてみて。食事をスマホしながら食べるのをやめるだけで、満足感が全然違う。"],ふたご座:["気になってた人に「最近どう？」って送ってみて。その一言が思わぬ展開を呼ぶ可能性がある。今月はコネクションを使う月。","アイデアが湧いてきたら、その場でメモする習慣をつけて。スマホのメモアプリでいい。今月の思いつきが来月の宝になる。","普段行かない種類のコンテンツに触れてみて。読まないジャンルの本、見ないジャンルの映画。視野が広がると発想も変わる。"],かに座:["信頼できる友達に、最近の本音を少し話してみて。全部話さなくていい。一つだけ吐き出すだけで、すごく楽になる。","自分に手紙を書いてみて。「最近頑張ってるね」「これよかったよ」短くていい。自分を認める練習になる。","「疲れた」と思ったときに何をすると回復するか、リストにしてみて。5個書ければ十分。いざというとき迷わずそこから選べるようになる。"],しし座:["自分がいいなと思ったものを「いいね」じゃなく言葉で伝えてみて。「あのとき助かった」「あれ好きだった」。人を喜ばせる言葉があなたにも返ってくる。","今月は誰かの「初挑戦」を応援してみて。背中を押してあげる体験が、自分の挑戦する勇気も育ててくれる。","鏡の前で一回だけ「今日もいい顔してる」って言ってみて。バカみたいでいい。続けると本当に自信が変わっていく。"],おとめ座:["「完璧にできたこと」じゃなく「やろうとしたこと」に丸をつける習慣をつけてみて。結果じゃなく姿勢を認めると、動くのが楽になる。","気になってた整理・片付けを一か所だけやってみて。引き出し一つでいい。空間がスッキリすると思考もスッキリする。","SNSのフォローを一度見直してみて。見るたびに気持ちが下がるアカウントは、ミュートかフォロー解除して。情報環境を整えることが心を整える。"],てんびん座:["今月は「どっちでもいいよ」を封印して、何かを一つだけ自分で決めてみて。ランチでも行き先でも。決める練習が自分軸を育てる。","部屋のインテリアを一か所変えてみて。クッションの色を変えるだけでいい。空間が整うと気持ちも整う。","今月お世話になった人に、LINEじゃなくて直接「ありがとう」を言ってみて。言葉にすることで関係が一段深まる。"],さそり座:["日記や記録をつけてみて。毎日じゃなくていい。「今日感じたこと一行」だけでいい。自分の感情パターンが見えてくる。","ずっと気になってたのに調べることを後回しにしてたことを、今月一つだけ深掘りしてみて。知った先に次の扉がある。","「これ手放したいな」と思ってるものを一つ処分してみて。物でも習慣でも。空いた場所に新しいものが入ってくる。"],いて座:["いつもと違うルートで移動してみて。知らない道は新しい発見をくれる。小さな冒険が今月のあなたにエネルギーをくれる。","気になってた場所に一人で行ってみて。カフェでも美術館でも。一人の時間が今月のあなたを充電させてくれる。","やりたいことリストを書いてみて。「できるかどうか」は関係なくていい。書くだけで現実が動き始める月。"],やぎ座:["「休む予定」をスケジュールに先に入れてみて。空白の日を意図的に作ること。埋めないことへの罪悪感をなくす練習にもなる。","今月達成したいことを、小さなステップに分解してみて。「大きな一歩」より「小さな一歩×10」のほうが絶対に続く。","信頼できる人に「最近どう見える？」って聞いてみて。自分では気づかない成長を教えてもらえることがある。"],みずがめ座:["誰にも言ってなかった自分の考えを、一人でいいから話してみて。アイデアは声に出すことで磨かれる。","新しいコミュニティや場所に顔を出してみて。オンラインでもいい。まったく違う価値観に触れることが、今月のあなたに刺激をくれる。","「普通こうでしょ」という常識を一つだけ疑ってみて。別にそうしなくてよかったじゃん、という発見が今月のどこかに必ずある。"],うお座:["創りたいもの、表現したいもの、何かあるなら今月だけでいいから形にしてみて。完成じゃなくていい。途中まででいい。","お気に入りの音楽を流しながら、何も考えずただ漂う時間を作って。罪悪感なんていらない。うお座にはそういう時間が必要。","信頼できる人に最近の自分の状態を正直に話してみて。「実はちょっとしんどい」を言葉にするだけで、気持ちが楽になる。"]};const questionMsgs={おひつじ座:["今月動こうとしてることの中で、「本当に自分がやりたいこと」はどれ？誰かのために動いてることと、自分のために動いてることを分けてみて。","「怖いけどやりたいこと」が今あるとしたら、何？その怖さの正体を一言で言えるなら、もうほぼ乗り越えてる。","今月の自分に点数をつけるなら何点？理由と一緒に考えてみて。その点数の差分が、来月の伸びしろになる。"],おうし座:["今の生活の中で、「これがあるから大丈夫」と思えるものはある？そのお守りみたいな存在を大切にしてる？","最後に「本当に美味しい」と感じたのはいつ？五感を喜ばせることを、最近どのくらい意識できてる？","今持っているもの、人間関係、習慣の中で、本当に大切なのはどれ？手放せないものと、実は手放してもいいものを分けてみて。"],ふたご座:["今月一番「面白い」と思ったことは何？その感覚を誰かに伝えたとき、どんな反応があった？","「知ってる」と「わかってる」は違う。今月深く理解したことと、まだ表面しか知らないことがあるとしたら、それぞれ何？","あなたのまわりで、「この人の話は何時間でも聞ける」という人は誰？その人のどこに惹かれてる？"],かに座:["最近「本当に安心できた」と思えた瞬間はあった？どんな状況だったか、思い出してみて。","誰かのために頑張ってることの中に、「本当は自分のためにやってる」ことが混じってない？","心の中で「まだ許せてない」ことはある？許すことと、忘れることと、受け入れることは違う。今どの段階にいる？"],しし座:["今月、誰かに「すごい」と言われたとき素直に受け取れた？もしモヤっとしたなら、その理由は何だと思う？","本当はもっと輝けるのに、何かが邪魔してると感じることはある？その「何か」の正体は？","自分のことを一番理解してくれてると思う人は誰？その人に最近ちゃんと感謝を伝えてる？"],おとめ座:["「もっとうまくできたはず」と思ってることと「十分うまくやれた」と思ってること、今月それぞれ何があった？","自分に厳しくしすぎてる部分はどこ？もし親友が同じ状況なら、なんて声をかける？","今の自分のルーティンの中で、「なんとなく続けてるけど意味ある？」と思うものはある？"],てんびん座:["最近「本当にこれがしたい」という気持ちで動けた場面はあった？それとも誰かに合わせてばかりだった？","今の人間関係の中で「この人といると消耗する」と感じることはある？気づいてるなら、どう対処してる？","美しいと思うものの中で、今月一番心を動かされたのは何？なんでそれが美しく見えたんだろう？"],さそり座:["今心の中で「まだ決断できてないこと」はある？決断できない理由は、怖さ？情報不足？それとも本当はもう答えが出てる？","信頼できると思ってる人のうち、本当に秘密を打ち明けられる人は何人いる？","手放したいのに手放せないでいるものがあるとしたら、それを手放せない本当の理由は何だと思う？"],いて座:["今月「退屈だな」と感じた瞬間はあった？その退屈はどこから来てた？環境？自分？それとも何か別のもの？","3年後の自分に、今の自分から手紙を書くとしたら、何を伝えたい？","「ずっとやってみたいけど、まだできてないこと」のリストに何がある？それをやれてない本当の理由は何？"],やぎ座:["今取り組んでいることの中で「本当はやりたくないけどやってる」ものはある？それを続ける理由は、義務感？恐れ？それとも本当の志？","最後に「よく頑張った」と自分を褒めたのはいつ？どんなことで？","今の自分のペースは、本当に自分が選んでるペース？それとも周りに合わせてるうちにそうなったペース？"],みずがめ座:["「理解されない」と感じることが多いテーマがあるとしたら、それは何？伝え方の問題？それとも本当に違う価値観を持ってる？","今の自分が「普通」だと思ってることで、実は誰もそう思ってないことがあるとしたら？","5年後に「あのとき始めてよかった」と思えることを、今月一つ始めるとしたら何をする？"],うお座:["最近「言えなかった本音」はある？それを言えなかった理由は、相手のため？それとも自分が傷つきたくなかったから？","今感じてる感情を、一つの色で表すとしたら何色？なんでその色を選んだの？","「ありのままの自分」でいられる場所や関係は、今の生活の中にある？それはどこで、誰と？"]};const closings=["今月もあなたらしく、でも無理しすぎないで。また来月届けるね。","しんどい日もあると思うけど、それは
