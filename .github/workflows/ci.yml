name: CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install root deps
        run: npm install

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

      - name: Build (prebuild syncs legal docs)
        working-directory: frontend
        run: npm run build

  api:
    name: API tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (firebase-admin, @vercel/node, @types/node)
        run: npm install

      - name: Type-check API
        run: npx tsc --noEmit -p api/tsconfig.json
