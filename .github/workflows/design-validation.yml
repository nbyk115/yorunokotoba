name: Design Validation

on:
  pull_request:
    paths:
      - '**/*.html'
      - '**/*.css'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.js'
      - 'design/contracts/**'
      - 'DESIGN.md'
  push:
    branches:
      - main

jobs:
  design-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: '20'

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Validate design contracts
        run: npx ts-node scripts/design/validate.ts

      - name: Check DESIGN.md exists
        run: test -f DESIGN.md

      - name: Check contracts exist
        run: |
          test -f design/contracts/tokens.json
          test -f design/contracts/rules.json
