name: Design Validation

on:
  pull_request:
    paths:
      - '**/*.html'
      - '**/*.css'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.js'
      - 'design/contracts/**'
      - 'DESIGN.md'
  push:
    branches:
      - main

jobs:
  design-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Validate design contracts
        # validate.ts は __dirname を使う CommonJS スクリプト.
        # ルート tsconfig が ESM だと __dirname 未定義でクラッシュするため module を固定する.
        run: npx ts-node --compiler-options '{"module":"commonjs"}' scripts/design/validate.ts

      - name: Check DESIGN.md exists
        run: test -f DESIGN.md

      - name: Check contracts exist
        run: |
          test -f design/contracts/tokens.json
          test -f design/contracts/rules.json
